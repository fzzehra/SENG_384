<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Refine Results</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(90deg, #edf1f6 0%, #eef5ea 100%);
            min-height: 100vh;
            color: #3d3f8f;
        }

        .page-title {
            text-align: center;
            font-size: 64px;
            font-weight: 800;
            color: #35349a;
            margin-top: 18px;
            margin-bottom: 18px;
            letter-spacing: 0.5px;
        }

        .main-card {
            width: 92%;
            max-width: 1120px;
            margin: 0 auto 30px auto;
            background: #fefefe;
            border-radius: 34px;
            padding: 38px 34px;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.05);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1.05fr;
            gap: 36px;
            align-items: start;
        }

        .left-panel {
            width: 100%;
        }

        .studio-badge {
            display: inline-block;
            padding: 10px 22px;
            border: 1.8px solid #cfd2f8;
            border-radius: 999px;
            color: #5560d8;
            font-weight: 700;
            letter-spacing: 3px;
            font-size: 13px;
            margin-bottom: 22px;
        }

        .preview-wrapper {
            width: 100%;
            border-radius: 28px;
            overflow: hidden;
            background: #f5f5fb;
            border: 1px solid #ececff;
            min-height: 530px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .preview-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        .left-buttons {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .reset-btn,
        .finish-btn {
            width: 100%;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s ease;
        }

        .reset-btn {
            background: #ffffff;
            color: #4a50c9;
            border: 1.6px solid #d9dcff;
            padding: 18px 20px;
            font-size: 18px;
        }

        .reset-btn:hover {
            background: #f8f9ff;
        }

        .finish-btn {
            background: linear-gradient(90deg, #5a5fe8 0%, #4845e8 100%);
            color: white;
            padding: 21px 20px;
            font-size: 18px;
            box-shadow: 0 12px 25px rgba(76, 82, 225, 0.28);
        }

        .finish-btn:hover {
            transform: translateY(-1px);
        }

        .finish-btn span {
            margin-left: 12px;
            font-size: 24px;
            vertical-align: middle;
        }

        .right-panel h3 {
            color: #666bc0;
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .feature-box {
            background: #ffffff;
            border: 1px solid #ececff;
            border-radius: 24px;
            padding: 22px 24px 26px 24px;
            margin-bottom: 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.02);
        }

        .feature-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
        }

        .feature-header span:first-child {
            font-size: 17px;
            font-weight: 700;
            color: #343a97;
        }

        .val-txt {
            font-size: 16px;
            font-weight: 800;
            color: #4d51de;
        }

        .refine-slider {
            width: 100%;
            appearance: none;
            -webkit-appearance: none;
            height: 7px;
            border-radius: 999px;
            background: #e7e8fb;
            outline: none;
        }

        .refine-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #4b4fe5;
            cursor: pointer;
            border: 4px solid #ffffff;
            box-shadow: 0 6px 18px rgba(75, 79, 229, 0.35);
        }

        .refine-slider::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #4b4fe5;
            cursor: pointer;
            border: 4px solid #ffffff;
            box-shadow: 0 6px 18px rgba(75, 79, 229, 0.35);
        }

        .status-text {
            margin-top: 10px;
            font-size: 14px;
            color: #6f73b8;
            min-height: 18px;
        }

        @media (max-width: 980px) {
            .page-title {
                font-size: 46px;
            }

            .content-grid {
                grid-template-columns: 1fr;
            }

            .preview-wrapper {
                min-height: 360px;
            }
        }
    </style>
</head>
<body>
    <h1 class="page-title">Refine Results</h1>

    <div class="main-card">
        <div class="content-grid">
            <!-- LEFT -->
            <div class="left-panel">
                <div class="studio-badge">LIVE STUDIO</div>

                <div class="preview-wrapper">
                    <img
                        id="preview-image"
                        src="{{ url_for('static', filename='uploads/original.jpg') }}"
                        alt="Preview"
                    />
                </div>

                <div class="left-buttons">
                    <button type="button" class="reset-btn" id="reset-btn">
                        Reset Adjustments
                    </button>

                    <button type="button" class="finish-btn" id="finish-btn">
                        Finish &amp; Analyze <span>→</span>
                    </button>

                    <div class="status-text" id="status-text"></div>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="right-panel">
                <h3>ADJUST FEATURES</h3>

                <div class="feature-box">
                    <div class="feature-header">
                        <span>Smile Enhance</span>
                        <span class="val-txt" id="smile-val">0%</span>
                    </div>
                    <input type="range" class="refine-slider" data-type="smile" min="0" max="100" value="0">
                </div>

                <div class="feature-box">
                    <div class="feature-header">
                        <span>Face</span>
                        <span class="val-txt" id="slim_face-val">0%</span>
                    </div>
                    <input type="range" class="refine-slider" data-type="slim_face" min="0" max="100" value="0">
                </div>

                <div class="feature-box">
                    <div class="feature-header">
                        <span>Aging Effect</span>
                        <span class="val-txt" id="aging-val">0%</span>
                    </div>
                    <input type="range" class="refine-slider" data-type="aging" min="0" max="100" value="0">
                </div>

                <div class="feature-box">
                    <div class="feature-header">
                        <span>Eyebrow Thickening</span>
                        <span class="val-txt" id="eyebrow-val">0%</span>
                    </div>
                    <input type="range" class="refine-slider" data-type="eyebrow" min="0" max="100" value="0">
                </div>

                <div class="feature-box">
                    <div class="feature-header">
                        <span>Lipstick (Red)</span>
                        <span class="val-txt" id="lipstick-val">0%</span>
                    </div>
                    <input type="range" class="refine-slider" data-type="lipstick" min="0" max="100" value="0">
                </div>

                <div class="feature-box">
                    <div class="feature-header">
                        <span>Eyeshadow (Purple)</span>
                        <span class="val-txt" id="eyeshadow-val">0%</span>
                    </div>
                    <input type="range" class="refine-slider" data-type="eyeshadow" min="0" max="100" value="0">
                </div>
            </div>
        </div>
    </div>

    <script>
        const sliders = document.querySelectorAll('.refine-slider');
        const previewImage = document.getElementById('preview-image');
        const resetBtn = document.getElementById('reset-btn');
        const finishBtn = document.getElementById('finish-btn');
        const statusText = document.getElementById('status-text');

        const originalImagePath = 'static/uploads/original.jpg';
        let debounceTimer = null;
        let latestOutputPath = originalImagePath;

        function setStatus(text) {
            statusText.textContent = text || '';
        }

        function updateSliderText(slider) {
            const id = slider.dataset.type + '-val';
            const valueText = document.getElementById(id);
            if (valueText) {
                valueText.textContent = slider.value + '%';
            }
        }

        sliders.forEach(slider => {
            updateSliderText(slider);

            slider.addEventListener('input', function () {
                updateSliderText(this);

                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    applyAllTransforms();
                }, 350);
            });
        });

        async function applyAllTransforms() {
            const transforms = [];

            sliders.forEach(slider => {
                const value = parseInt(slider.value, 10);
                if (value > 0) {
                    transforms.push({
                        type: slider.dataset.type,
                        intensity: value / 100
                    });
                }
            });

            if (transforms.length === 0) {
                previewImage.src = '/' + originalImagePath + '?v=' + Date.now();
                latestOutputPath = originalImagePath;
                setStatus('All adjustments cleared.');
                return;
            }

            try {
                setStatus('Applying transformations...');

                const response = await fetch("{{ url_for('transform.transform_image') }}", {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        image_path: originalImagePath,
                        transforms: transforms
                    })
                });

                const result = await response.json();
                console.log('Transform response:', result);

                if (!response.ok) {
                    setStatus('');
                    alert(result.message || 'Transform failed');
                    return;
                }

                if (result.data && result.data.output_path) {
                    latestOutputPath = result.data.output_path;
                    previewImage.src = '/' + result.data.output_path + '?v=' + Date.now();
                    setStatus('Transformation applied successfully.');
                } else {
                    setStatus('');
                    alert('No output image returned from server.');
                }

            } catch (error) {
                console.error('Transform fetch error:', error);
                setStatus('');
                alert('Transform failed');
            }
        }

        resetBtn.addEventListener('click', function () {
            sliders.forEach(slider => {
                slider.value = 0;
                updateSliderText(slider);
            });

            latestOutputPath = originalImagePath;
            previewImage.src = '/' + originalImagePath + '?v=' + Date.now();
            setStatus('Adjustments reset.');
        });

        finishBtn.addEventListener('click', function () {
            window.location.href = "{{ url_for('result_page') }}";
        });
    </script>
</body>
</html>
