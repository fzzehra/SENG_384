<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controls - Facial Image Analysis</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap');

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8fcd4 50%, #f4f0ff 100%);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-x: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .blob-1 {
      width: 320px;
      height: 320px;
      background: #b0b0ff;
      top: -80px;
      left: -80px;
    }

    .blob-2 {
      width: 260px;
      height: 260px;
      background: #a8f0c0;
      bottom: -60px;
      right: -60px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
      position: relative;
      z-index: 1;
    }

    .badge {
      display: inline-block;
      background: rgba(70, 70, 229, 0.1);
      color: #4646e5;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
      border: 1px solid rgba(70, 70, 229, 0.2);
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      color: #2a2a7a;
      line-height: 1.2;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 28px;
      padding: 44px 48px;
      width: 100%;
      max-width: 900px;
      box-shadow: 0 20px 60px rgba(70, 70, 229, 0.1);
      animation: fadeUp 0.7s 0.15s ease both;
      position: relative;
      z-index: 1;
    }

    .main-grid {
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
    }

    .preview-container {
      position: sticky;
      top: 20px;
      border-radius: 20px;
      overflow: hidden;
      border: 1.5px solid rgba(70, 70, 229, 0.1);
      background: #fff;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    .preview-container img {
      width: 100%;
      height: auto;
      display: block;
    }

    .controls-side {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #6060aa;
      margin-bottom: 5px;
      display: block;
    }

    .control-item {
      background: rgba(255, 255, 255, 0.45);
      padding: 18px 20px;
      border-radius: 18px;
      border: 1px solid rgba(70, 70, 229, 0.08);
      transition: all 0.25s ease;
    }

    .control-item:hover {
      border-color: rgba(70, 70, 229, 0.25);
      box-shadow: 0 8px 24px rgba(70, 70, 229, 0.08);
    }

    .control-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      gap: 12px;
    }

    .control-title {
      font-size: 14px;
      font-weight: 700;
      color: #2a2a7a;
    }

    .val-txt {
      font-size: 14px;
      color: #4646e5;
      font-weight: 700;
      white-space: nowrap;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 7px;
      background: rgba(70, 70, 229, 0.12);
      border-radius: 5px;
      outline: none;
      margin: 10px 0 4px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      background: #4646e5;
      border: 3px solid white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 5px 16px rgba(70, 70, 229, 0.35);
      transition: transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      background: #4646e5;
      border: 3px solid white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 5px 16px rgba(70, 70, 229, 0.35);
    }

    .nav-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      text-decoration: none;
      background: linear-gradient(135deg, #6060e5, #4646e5);
      color: white;
      font-size: 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 24px rgba(70, 70, 229, 0.35);
    }

    .nav-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(70, 70, 229, 0.45);
    }

    .reset-btn {
      width: 100%;
      margin-top: 12px;
      padding: 13px;
      border-radius: 14px;
      border: 1.5px solid rgba(70, 70, 229, 0.2);
      background: rgba(255, 255, 255, 0.55);
      color: #4646e5;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .reset-btn:hover {
      background: rgba(70, 70, 229, 0.08);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 800px) {
      .main-grid {
        grid-template-columns: 1fr;
      }

      .card {
        padding: 30px 24px;
      }

      .page-header h1 {
        font-size: 34px;
      }
    }
  </style>
</head>

<body>
  {% include 'base.html' %}

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page-header">
    <div class="badge">Adjustment Studio</div>
    <h1>Refine Results</h1>
  </div>

  <div class="card main-grid">

    <div class="preview-side">
      <div class="badge">Live Studio</div>

      <div class="preview-container">
        <img
          id="livePreview"
          src="/static/uploads/transformed.jpg?v={{ cache_buster }}"
          alt="Live Preview"
          onerror="this.src='/static/uploads/original.jpg?v=' + new Date().getTime();"
        >
      </div>

      <button type="button" class="reset-btn" id="resetBtn">
        Reset Adjustments
      </button>

      <div style="margin-top: 24px;">
        <a class="nav-btn" href="{{ url_for('preview_page') }}">
          Finish & Analyze
          <svg viewBox="0 0 24 24" stroke-width="2" style="width: 18px; height: 18px; fill: none; stroke: currentColor;">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </a>
      </div>
    </div>

    <div class="controls-side">
      <span class="field-label">Adjust Features</span>

      <div class="control-item">
        <div class="control-head">
          <span class="control-title">Smile Enhance</span>
          <span class="val-txt" id="smile-val">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="smile" min="0" max="100" value="0">
      </div>

      <div class="control-item">
        <div class="control-head">
          <span class="control-title">Eyebrow Thickening</span>
          <span class="val-txt" id="eyebrow-val">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="eyebrow" min="0" max="100" value="0">
      </div>

      <div class="control-item">
        <div class="control-head">
          <span class="control-title">Lip Widening</span>
          <span class="val-txt" id="lip_widening-val">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="lip_widening" min="0" max="100" value="0">
      </div>

      <div class="control-item">
        <div class="control-head">
          <span class="control-title">Face Widening</span>
          <span class="val-txt" id="face_widening-val">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="face_widening" min="0" max="100" value="0">
      </div>

      <div class="control-item">
        <div class="control-head">
          <span class="control-title">Aging</span>
          <span class="val-txt" id="aging-val">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="aging" min="0" max="100" value="0">
      </div>

      <div class="control-item">
        <div class="control-head">
          <span class="control-title">De-Aging</span>
          <span class="val-txt" id="deaging-val">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="deaging" min="0" max="100" value="0">
      </div>

      <div class="control-item">
        <div class="control-head">
          <span class="control-title">Show Landmarks</span>
          <span class="val-txt" id="landmarks-val">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="landmarks" min="0" max="100" value="0">
      </div>
    </div>
  </div>

  <script>
    const sliders = document.querySelectorAll('.refine-slider');
    const livePreview = document.getElementById('livePreview');
    const resetBtn = document.getElementById('resetBtn');

    let debounceTimer;

    async function applyAllTransforms() {
      const transforms = [];

      sliders.forEach(slider => {
        const value = parseInt(slider.value);

        if (value > 0) {
          transforms.push({
            type: slider.dataset.type,
            intensity: value / 100
          });
        }
      });

      if (transforms.length === 0) {
        livePreview.src = '/static/uploads/original.jpg?v=' + new Date().getTime();
        return;
      }

      try {
        const response = await fetch('/transform/', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            image_path: 'static/uploads/original.jpg',
            transforms: transforms
          })
        });

        const data = await response.json();

        if (data.success) {
          livePreview.src = '/static/uploads/transformed.jpg?v=' + new Date().getTime();
        } else {
          console.error('Transform failed:', data);
        }

      } catch (err) {
        console.error('Transform error:', err);
      }
    }

    sliders.forEach(slider => {
      slider.addEventListener('input', function () {
        const type = this.dataset.type;
        const valueText = document.getElementById(`${type}-val`);

        if (valueText) {
          valueText.textContent = this.value + '%';
        }

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyAllTransforms, 400);
      });
    });

    resetBtn.addEventListener('click', function () {
      sliders.forEach(slider => {
        slider.value = 0;

        const type = slider.dataset.type;
        const valueText = document.getElementById(`${type}-val`);

        if (valueText) {
          valueText.textContent = '0%';
        }
      });

      livePreview.src = '/static/uploads/original.jpg?v=' + new Date().getTime();
    });
  </script>

</body>
</html>
