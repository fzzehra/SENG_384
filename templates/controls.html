<!DOCTYPE html>
<html lang="en">
    
<head>
  <meta charset="UTF-8">
  <meta name="viewport" initial-scale=1.0">
  <title>Controls - Facial Image Analysis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8fcd4 50%, #f4f0ff 100%);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.35;
      pointer-events: none;
    }
    .blob-1 { width: 320px; height: 320px; background: #b0b0ff; top: -80px; left: -80px; }
    .blob-2 { width: 260px; height: 260px; background: #a8f0c0; bottom: -60px; right: -60px; }

    .page-header {
      text-align: center;
      margin-bottom: 40px;
      animation: fadeDown 0.6s ease both;
    }

    .badge {
      display: inline-block;
      background: rgba(70, 70, 229, 0.1);
      color: #4646e5;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
      border: 1px solid rgba(70, 70, 229, 0.2);
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 42px;
      color: #2a2a7a;
      line-height: 1.2;
    }

    .card {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: 28px;
      padding: 44px 48px;
      width: 100%;
      max-width: 900px;
      box-shadow: 0 20px 60px rgba(70, 70, 229, 0.1);
      animation: fadeUp 0.7s 0.15s ease both;
    }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #6060aa;
      margin-bottom: 14px;
      display: block;
    }

    input[type="range"] {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: rgba(70, 70, 229, 0.1);
      border-radius: 5px;
      outline: none;
      margin: 20px 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      background: #4646e5;
      border: 3px solid white;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(70, 70, 229, 0.3);
      transition: transform 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .nav-btn {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      text-decoration: none;
      background: linear-gradient(135deg, #6060e5, #4646e5);
      color: white;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 24px rgba(70, 70, 229, 0.35);
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }

    .nav-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 32px rgba(70, 70, 229, 0.45);
    }

    .nav-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
{% include 'base.html' %}
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="page-header">
    <div class="badge">Adjustment Studio</div>
    <h1>Refine Results</h1>
  </div>

  <div class="card" style="max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
    <!-- Sol: Önizleme -->
    <div class="preview-side">
      <div class="badge">Live Studio</div>
      <div class="preview-container" style="position: sticky; top: 0; border-radius: 20px; overflow: hidden; border: 1.5px solid rgba(70, 70, 229, 0.1); background: #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.05);align-self: start;">
        <img id="livePreview" src="/static/uploads/original.jpg?v={{ cache_buster }}" style="width: 100%; height: auto; display: block;">
      </div>
      <div style="margin-top: 30px;">
        <button class="nav-btn" id="finishBtn" >
          Finish & Analyze
          <svg viewBox="0 0 24 24" stroke-width="2" style="width: 18px; height: 18px; fill: none; stroke: currentColor;">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <!-- Sağ: Kontroller -->
    <div class="controls-side" style="display: flex; flex-direction: column; gap: 20px;">
      <span class="field-label" style="margin-bottom: 5px;">Adjust Features</span>

      <div class="control-item" style="background: rgba(255,255,255,0.4); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.05);">
  <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
    <span style="font-size: 13px; font-weight: 600; color: #2a2a7a;">Face Slim / Widen</span>
    <span class="val-txt" id="slim_face-val" style="font-size: 13px; color: #4646e5; font-weight: 600;">0%</span>
  </div>
  <div style="position: relative;">
    <input type="range" class="refine-slider" data-type="slim_face" min="-100" max="100" value="0" style="margin: 5px 0;">
    <!-- Orta çentik -->
    <div style="position: absolute; left: 50%; top: -4px; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; pointer-events: none;">
      <div style="width: 2px; height: 10px; background: rgba(70,70,229,0.4); border-radius: 1px;"></div>
    </div>
  </div>
  
</div>



      <div class="control-item" style="background: rgba(255,255,255,0.4); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.05);">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 13px; font-weight: 600; color: #2a2a7a;">Aging Effect</span>
          <span class="val-txt" id="aging-val" style="font-size: 13px; color: #4646e5; font-weight: 600;">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="aging" min="0" max="100" value="0" style="margin: 5px 0;">
      </div>

      <div class="control-item" style="background: rgba(255,255,255,0.4); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.05);">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 13px; font-weight: 600; color: #2a2a7a;">Eyebrow Thickening</span>
          <span class="val-txt" id="eyebrow-val" style="font-size: 13px; color: #4646e5; font-weight: 600;">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="eyebrow" min="0" max="100" value="0" style="margin: 5px 0;">
      </div>

      <div class="control-item" style="background: rgba(255,255,255,0.4); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.05);">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 13px; font-weight: 600; color: #2a2a7a;">Lip Widening</span>
          <span class="val-txt" id="lip_widen-val" style="font-size: 13px; color: #4646e5; font-weight: 600;">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="lip_widen" min="0" max="100" value="0" style="margin: 5px 0;">
      </div>

      <div class="control-item" style="background: rgba(70,70,229,0.05); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.1);">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 13px; font-weight: 600; color: #4646e5;">Lipstick (Red)</span>
          <span class="val-txt" id="lipstick-val" style="font-size: 13px; color: #4646e5; font-weight: 600;">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="lipstick" min="0" max="100" value="0" style="margin: 5px 0;">
      </div>

      <div class="control-item" style="background: rgba(70,70,229,0.05); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.1);">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 13px; font-weight: 600; color: #4646e5;">Eyeshadow (Purple)</span>
          <span class="val-txt" id="eyeshadow-val" style="font-size: 13px; color: #4646e5; font-weight: 600;">0%</span>
        </div>
        <input type="range" class="refine-slider" data-type="eyeshadow" min="0" max="100" value="0" style="margin: 5px 0;">
      </div>

      <!-- Hair Color -->
      <div class="control-item" style="background: rgba(255,255,255,0.4); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.05);">
        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
          <span style="font-size: 13px; font-weight: 600; color: #2a2a7a;">Hair Color</span>
          <span class="val-txt" id="hair_color-val" style="font-size: 13px; color: #4646e5; font-weight: 600;">0%</span>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 4px;">
          <label style="font-size: 11px; color: #8888bb; font-weight: 600;">Color:</label>
          <input type="color" id="hairColorPicker" value="#3b1f0a" style="width: 36px; height: 28px; border: none; border-radius: 6px; cursor: pointer; padding: 0;">
        </div>
        <input type="range" class="refine-slider" data-type="hair_color" min="0" max="100" value="0" style="margin: 5px 0;">
      </div>

      <!-- Hair Overlay -->
      <div class="control-item" style="background: rgba(255,255,255,0.4); padding: 15px; border-radius: 16px; border: 1px solid rgba(70,70,229,0.05);">
        <div style="margin-bottom: 10px;">
          <span style="font-size: 13px; font-weight: 600; color: #2a2a7a;">Hairstyle</span>
        </div>
        <div id="hairstyleList" style="display: flex; flex-wrap: wrap; gap: 8px;">
          <span style="font-size: 12px; color: #8888bb;">Loading...</span>
        </div>
        <button onclick="clearHairstyle()" style="margin-top: 10px; font-size: 11px; color: #4646e5; background: none; border: 1px solid rgba(70,70,229,0.3); border-radius: 8px; padding: 4px 12px; cursor: pointer; font-family: inherit;">Remove</button>
      </div>
    </div>
  </div>

  <script>
    const sliders = document.querySelectorAll('.refine-slider');
    const livePreview = document.getElementById('livePreview');
    const finishBtn = document.getElementById('finishBtn');
    let debounceTimer;
    let selectedOverlay = null;

    // Saç stillerini yükle
    fetch('/hairstyles')
      .then(r => r.json())
      .then(files => {
        const container = document.getElementById('hairstyleList');
        if (files.length === 0) {
          container.innerHTML = '<span style="font-size:12px;color:#8888bb;">static/hairstyles/ klasörüne PNG ekle</span>';
          return;
        }
        container.innerHTML = '';
        files.forEach(file => {
          const btn = document.createElement('button');
          btn.textContent = file.replace('.png', '');
          btn.dataset.overlay = file;
          btn.style.cssText = 'padding:6px 14px;border-radius:10px;border:1.5px solid rgba(70,70,229,0.2);background:rgba(255,255,255,0.6);font-size:12px;color:#2a2a7a;cursor:pointer;transition:all 0.2s;font-family:inherit;';
          btn.onclick = () => selectOverlay(file, btn);
          container.appendChild(btn);
        });
      });

    function selectOverlay(file, btn) {
      selectedOverlay = file;
      document.querySelectorAll('#hairstyleList button').forEach(b => {
        b.style.borderColor = 'rgba(70,70,229,0.2)';
        b.style.background = 'rgba(255,255,255,0.6)';
        b.style.color = '#2a2a7a';
      });
      btn.style.borderColor = '#4646e5';
      btn.style.background = 'rgba(70,70,229,0.1)';
      btn.style.color = '#4646e5';
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(applyAllTransforms, 100);
    }

    function clearHairstyle() {
      selectedOverlay = null;
      document.querySelectorAll('#hairstyleList button').forEach(b => {
        b.style.borderColor = 'rgba(70,70,229,0.2)';
        b.style.background = 'rgba(255,255,255,0.6)';
        b.style.color = '#2a2a7a';
      });
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(applyAllTransforms, 100);
    }

    function buildTransforms() {
  const transforms = [];

  sliders.forEach(slider => {
    const val = parseInt(slider.value);
    
    // SIFIR DEĞİLSE gönder (Böylece hem pozitif hem negatif değerler gider)
    // Eski hali 'val > 0' idi, bu negatifleri engelliyordu.
    if (val !== 0) {
      const t = { type: slider.dataset.type, intensity: val / 100 };
      
      if (slider.dataset.type === 'hair_color') {
        t.params = { color: document.getElementById('hairColorPicker').value };
      }
      
      transforms.push(t);
    }
  });

  if (selectedOverlay) {
    transforms.push({ type: 'hair_overlay', intensity: 1.0, params: { overlay: selectedOverlay } });
  }

  return transforms;
}

    async function applyAllTransforms() {
      const transforms = buildTransforms();

      if (transforms.length === 0) {
        livePreview.src = '/static/uploads/original.jpg?v=' + new Date().getTime();
        return;
      }

      try {
        const response = await fetch('/transform/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            image_path: 'static/uploads/original.jpg',
            transforms: transforms
          })
        });

        const data = await response.json();
        if (data.success) {
          livePreview.src = '/static/uploads/transformed.jpg?v=' + new Date().getTime();
        }
      } catch (err) {
        console.error('Transform error:', err);
      }
    }

   sliders.forEach(slider => {
  slider.addEventListener('input', (e) => {
    let val = parseInt(e.target.value);
    const type = e.target.dataset.type;

    // Sadece Face Slim/Widen gibi çift yönlü sliderlarda 
    // mıknatıs etkisi yapmak istersen bu kontrolü kullanabilirsin:
    if (type === 'slim_face') {
      if (val > -5 && val < 5) {
        val = 0;
        e.target.value = 0;
      }
    }

    document.getElementById(`${type}-val`).textContent = val + '%';
    
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(applyAllTransforms, 400);
  });
});

    finishBtn.addEventListener('click', async () => {
      finishBtn.disabled = true;
      finishBtn.textContent = 'Saving...';

      const transforms = buildTransforms();
      const transformType = transforms.length > 0 ? transforms.map(t => t.type).join(', ') : 'none';
      const avgIntensity = transforms.length > 0
        ? transforms.reduce((s, t) => s + t.intensity, 0) / transforms.length
        : 0;

      try {
        await fetch('/save-history', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ transform_type: transformType, intensity: avgIntensity })
        });
      } catch (e) {
        console.error('History save error:', e);
      }

      window.location.href = '{{ url_for("preview_page") }}';
    });
  </script>

</body>
</html>
